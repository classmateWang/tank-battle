<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 - Tank Battle</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@400;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a12;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Noto Sans SC', 'Segoe UI', Arial, sans-serif;
  overflow: hidden;
  position: relative;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(0,150,255,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 50%, rgba(255,50,50,0.06) 0%, transparent 50%);
  pointer-events: none;
}

.game-wrapper {
  background: linear-gradient(145deg, #141420, #1a1a2e);
  padding: 24px;
  border-radius: 20px;
  box-shadow:
    0 0 80px rgba(0,100,255,0.08),
    inset 0 1px 0 rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.04);
}

/* --- HUD --- */
.hud {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 6px 16px 6px;
  gap: 20px;
}

.hud-left, .hud-right {
  display: flex;
  align-items: center;
  gap: 24px;
}

.hud-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.hud-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.3);
  font-family: 'Orbitron', monospace;
}

.hud-score {
  font-family: 'Orbitron', monospace;
  font-size: 26px;
  font-weight: 700;
  background: linear-gradient(135deg, #ffd700, #ffaa00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}

.hud-wave {
  font-family: 'Orbitron', monospace;
  font-size: 20px;
  font-weight: 700;
  color: #74b9ff;
  text-shadow: 0 0 20px rgba(116,185,255,0.3);
  line-height: 1;
}

.hud-lives {
  font-size: 20px;
  font-weight: 700;
  color: #ff6b81;
  line-height: 1;
}

/* HP bar container */
.hp-container {
  display: flex;
  align-items: center;
  gap: 10px;
}
.hp-container .hud-label {
  margin-bottom: 2px;
}
.hp-bar-outer {
  width: 140px;
  height: 8px;
  background: rgba(255,255,255,0.06);
  border-radius: 4px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.06);
  position: relative;
}
.hp-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.25s ease;
  background: linear-gradient(90deg, #ff4757, #ff6b81 30%, #2ed573 70%, #7bed9f);
  background-size: 200% 100%;
  box-shadow: 0 0 12px rgba(46,213,115,0.3);
}

/* Enemies remaining */
.hud-enemy-count {
  font-family: 'Orbitron', monospace;
  font-size: 18px;
  font-weight: 700;
  color: #ff6b6b;
  line-height: 1;
}

/* --- Canvas --- */
canvas {
  display: block;
  border-radius: 12px;
  box-shadow:
    0 0 40px rgba(0,0,0,0.5),
    inset 0 0 60px rgba(0,0,0,0.3);
  background: #1e272e;
  cursor: crosshair;
  image-rendering: pixelated;
}

/* --- Footer --- */
.game-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 14px;
}
.footer-controls {
  display: flex;
  gap: 16px;
}
.key-hint {
  display: flex;
  align-items: center;
  gap: 6px;
  color: rgba(255,255,255,0.35);
  font-size: 12px;
}
.key-hint kbd {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 2px 8px;
  border-radius: 4px;
  color: rgba(255,255,255,0.6);
  font-family: 'Orbitron', monospace;
  font-size: 10px;
  letter-spacing: 0.5px;
}
.key-hint .sep {
  color: rgba(255,255,255,0.15);
}

.footer-status {
  font-size: 12px;
  color: rgba(255,255,255,0.25);
  font-family: 'Orbitron', monospace;
  letter-spacing: 1px;
}

/* --- Responsive --- */
@media (max-width: 860px) {
  .game-wrapper { padding: 12px; border-radius: 12px; }
  .hud { flex-wrap: wrap; gap: 12px; }
  .hp-bar-outer { width: 100px; }
}
</style>
</head>
<body>

<div class="game-wrapper">
  <!-- HUD -->
  <div class="hud">
    <div class="hud-left">
      <div class="hud-item">
        <span class="hud-label">Score</span>
        <span class="hud-score" id="scoreDisplay">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Wave</span>
        <span class="hud-wave" id="waveDisplay">1</span>
      </div>
    </div>

    <div class="hp-container">
      <div>
        <div class="hud-label" style="text-align:center">HP</div>
        <div class="hp-bar-outer">
          <div class="hp-bar-fill" id="healthFill" style="width:100%"></div>
        </div>
      </div>
    </div>

    <div class="hud-right">
      <div class="hud-item">
        <span class="hud-label">Lives</span>
        <span class="hud-lives" id="livesDisplay">3</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">Left</span>
        <span class="hud-enemy-count" id="enemyCount">0</span>
      </div>
    </div>
  </div>

  <canvas id="gameCanvas" width="800" height="600"></canvas>

  <div class="game-footer">
    <div class="footer-controls">
      <span class="key-hint"><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> <span class="sep">·</span> 移动</span>
      <span class="key-hint"><kbd>Space</kbd> <span class="sep">·</span> 射击</span>
    </div>
    <span class="footer-status">TANK BATTLE v2.0</span>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreSpan = document.getElementById('scoreDisplay');
const waveSpan = document.getElementById('waveDisplay');
const healthFill = document.getElementById('healthFill');
const livesSpan = document.getElementById('livesDisplay');
const enemyCountSpan = document.getElementById('enemyCount');

const W = 800, H = 600;
const TANK_SIZE = 32;
const BULLET_RADIUS = 4;
const TILE = 40;

const DIR = {
  UP: 0, RIGHT: 1, DOWN: 2, LEFT: 3,
  dx: [0, 1, 0, -1],
  dy: [-1, 0, 1, 0]
};

// --- Game State ---
const game = {
  state: 'playing',
  score: 0,
  wave: 1,
  enemiesRemaining: 0,
  enemiesPerWave: 3,
  spawnTimer: 0,
  spawnInterval: 240,
  frame: 0,
  particles: [],
  explosions: [],
  powerups: [],
  keys: {},
};

// --- Tank class ---
class Tank {
  constructor(x, y, dir, isPlayer) {
    this.x = x;
    this.y = y;
    this.dir = dir;
    this.size = TANK_SIZE;
    this.speed = isPlayer ? 1.6 : 1.0;
    this.hp = isPlayer ? 100 : 50;
    this.maxHp = this.hp;
    this.isPlayer = isPlayer;
    this.cooldown = 0;
    this.maxCooldown = isPlayer ? 28 : 80;
    this.alive = true;
    this.canFire = true; // for trigger-style firing
    this.stuckCount = 0;
    this.aiChangeTimer = 0;
  }

  get cx() { return this.x + this.size / 2; }
  get cy() { return this.y + this.size / 2; }
}

// --- Bullet ---
class Bullet {
  constructor(x, y, dir, isPlayer) {
    this.x = x;
    this.y = y;
    this.dir = dir;
    this.speed = isPlayer ? 6 : 4;
    this.r = BULLET_RADIUS;
    this.isPlayer = isPlayer;
    this.alive = true;
    this.trail = [];
  }
}

// --- Particle ---
class Particle {
  constructor(x, y, color, vx, vy, life, size) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.color = color;
    this.life = life;
    this.maxLife = life;
    this.size = size || 3;
    this.alive = true;
  }
}

// --- Explosion ---
class Explosion {
  constructor(x, y, big) {
    this.x = x; this.y = y;
    this.radius = big ? 8 : 4;
    this.maxRadius = big ? 50 : 30;
    this.life = big ? 30 : 20;
    this.maxLife = this.life;
    this.alive = true;
    this.big = big;
  }
}

// --- Map / Walls ---
let walls = [];

function initMap() {
  walls = [];
  const borderStyle = { type: 'border', hp: Infinity };
  for (let x = 0; x < W; x += TILE) {
    walls.push({ x, y: 0, w: TILE, h: TILE, ...borderStyle });
    walls.push({ x, y: H - TILE, w: TILE, h: TILE, ...borderStyle });
  }
  for (let y = TILE; y < H - TILE; y += TILE) {
    walls.push({ x: 0, y, w: TILE, h: TILE, ...borderStyle });
    walls.push({ x: W - TILE, y, w: TILE, h: TILE, ...borderStyle });
  }

  const layouts = [
    () => {
      const bricks = [
        [5,2],[5,3],[5,4],[5,5],[5,6],[5,7],[5,8],[5,9],[5,10],[5,11],[5,12],
        [14,2],[14,3],[14,4],[14,5],[14,6],[14,7],[14,8],[14,9],[14,10],[14,11],[14,12],
        [3,5],[4,5],[6,5],[7,5],[8,5],[9,5],[10,5],[11,5],[12,5],[13,5],[15,5],[16,5],[17,5],
        [3,10],[4,10],[6,10],[7,10],[8,10],[9,10],[10,10],[11,10],[12,10],[13,10],[15,10],[16,10],[17,10],
        [9,2],[9,3],[9,4],[9,11],[9,12],[9,13],
        [2,8],[3,8],[4,8],[5,8],
        [15,7],[16,7],[17,7],[18,7],
      ];
      for (const [col, row] of bricks) {
        walls.push({ x: col * TILE, y: row * TILE, w: TILE, h: TILE, type: 'brick', hp: 40 });
      }
    },
    () => {
      const bricks = [
        [2,2],[2,3],[2,4],[2,5],[2,6],[2,7],[2,8],[2,9],[2,10],[2,11],[2,12],[2,13],
        [18,2],[18,3],[18,4],[18,5],[18,6],[18,7],[18,8],[18,9],[18,10],[18,11],[18,12],[18,13],
        [4,3],[5,3],[6,3],[7,3],[8,3],[9,3],[10,3],[11,3],[12,3],[13,3],[14,3],[15,3],[16,3],
        [4,12],[5,12],[6,12],[7,12],[8,12],[9,12],[10,12],[11,12],[12,12],[13,12],[14,12],[15,12],[16,12],
        [7,5],[8,5],[9,5],[10,5],[11,5],[12,5],[13,5],
        [7,10],[8,10],[9,10],[10,10],[11,10],[12,10],[13,10],
        [4,7],[5,7],[6,7],[7,7],[13,7],[14,7],[15,7],[16,7],
        [4,8],[5,8],[6,8],[7,8],[13,8],[14,8],[15,8],[16,8],
        [10,2],[10,13],
      ];
      for (const [col, row] of bricks) {
        walls.push({ x: col * TILE, y: row * TILE, w: TILE, h: TILE, type: 'brick', hp: 40 });
      }
    },
    () => {
      const bricks = [
        [5,3],[6,3],[7,3],[8,3],[9,3],[10,3],[11,3],[12,3],[13,3],[14,3],[15,3],
        [5,12],[6,12],[7,12],[8,12],[9,12],[10,12],[11,12],[12,12],[13,12],[14,12],[15,12],
        [10,5],[10,6],[10,7],[10,8],[10,9],[10,10],
        [3,5],[4,5],[5,5],[6,5],[7,5],
        [3,10],[4,10],[5,10],[6,10],[7,10],
        [13,5],[14,5],[15,5],[16,5],[17,5],
        [13,10],[14,10],[15,10],[16,10],[17,10],
        [5,7],[6,7],[7,7],[8,7],
        [5,8],[6,8],[7,8],[8,7],
        [12,7],[13,7],[14,7],[15,7],
        [12,8],[13,8],[14,8],[15,8],
        [3,2],[4,2],[5,2],[6,2],[7,2],
        [13,2],[14,2],[15,2],[16,2],[17,2],
        [3,13],[4,13],[5,13],[6,13],[7,13],
        [13,13],[14,13],[15,13],[16,13],[17,13],
      ];
      for (const [col, row] of bricks) {
        walls.push({ x: col * TILE, y: row * TILE, w: TILE, h: TILE, type: 'brick', hp: 40 });
      }
    },
  ];

  layouts[Math.floor(Math.random() * layouts.length)]();
}

// --- Game objects ---
let player = null;
let enemies = [];
let bullets = [];

function resetGame() {
  player = new Tank(2 * TILE, 12 * TILE, DIR.UP, true);
  player.hp = 100;
  player.maxHp = 100;
  enemies = [];
  bullets = [];
  game.particles = [];
  game.explosions = [];
  game.powerups = [];
  game.score = 0;
  game.wave = 1;
  game.enemiesPerWave = 3;
  game.enemiesRemaining = game.enemiesPerWave;
  game.spawnTimer = 0;
  game.spawnInterval = 240;
  game.state = 'playing';
  player.alive = true;
  lives = 3;
  initMap();
  updateUI();
}

let lives = 3;

// --- Collision ---
function rectOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

function canMove(tank, nx, ny) {
  const tb = { x: nx, y: ny, w: tank.size, h: tank.size };
  for (const w of walls) {
    if (rectOverlap(tb, { x: w.x, y: w.y, w: w.w, h: w.h })) return false;
  }
  const allTanks = [player, ...enemies].filter(t => t && t.alive && t !== tank);
  for (const t of allTanks) {
    if (rectOverlap(tb, { x: t.x, y: t.y, w: t.size, h: t.size })) return false;
  }
  return true;
}

function canPlace(x, y) {
  const tb = { x, y, w: TANK_SIZE, h: TANK_SIZE };
  for (const w of walls) {
    if (rectOverlap(tb, { x: w.x, y: w.y, w: w.w, h: w.h })) return false;
  }
  return true;
}

// --- Spawning ---
function getSpawnPos() {
  const candidates = [
    { x: 2 * TILE, y: 2 * TILE },
    { x: 10 * TILE, y: 2 * TILE },
    { x: 17 * TILE, y: 2 * TILE },
    { x: 2 * TILE, y: 7 * TILE },
    { x: 17 * TILE, y: 7 * TILE },
    { x: 10 * TILE, y: 13 * TILE },
  ];
  const shuffled = candidates.sort(() => Math.random() - 0.5);
  for (const pos of shuffled) {
    if (!canPlace(pos.x, pos.y)) continue;
    if (player && player.alive) {
      const dist = Math.hypot(pos.x - player.x, pos.y - player.y);
      if (dist < 250) continue;
    }
    return pos;
  }
  return { x: 18 * TILE, y: 2 * TILE };
}

function spawnEnemy() {
  if (game.state !== 'playing') return;
  if (enemies.length >= 5) return;
  const pos = getSpawnPos();
  if (!pos) return;
  const dirs = [DIR.DOWN, DIR.LEFT, DIR.RIGHT, DIR.UP];
  const tank = new Tank(pos.x, pos.y, dirs[Math.floor(Math.random() * 4)], false);
  tank.hp = 40 + game.wave * 8;
  tank.maxHp = tank.hp;
  tank.speed = 1 + Math.min(game.wave * 0.04, 0.4);
  tank.maxCooldown = Math.max(55, 80 - game.wave * 1.5);
  enemies.push(tank);
  spawnEffect(pos.x + TANK_SIZE/2, pos.y + TANK_SIZE/2);
}

function spawnEffect(x, y) {
  for (let i = 0; i < 20; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    game.particles.push(new Particle(
      x, y, '#74b9ff',
      Math.cos(angle) * speed,
      Math.sin(angle) * speed,
      20 + Math.random() * 15,
      2 + Math.random() * 3
    ));
  }
}

// --- Bullet logic ---
function fireBullet(tank) {
  if (tank.cooldown > 0) return;
  if (!tank.alive) return;
  tank.cooldown = tank.maxCooldown;
  const cx = tank.cx;
  const cy = tank.cy;
  const bx = cx + DIR.dx[tank.dir] * (tank.size / 2 + 2);
  const by = cy + DIR.dy[tank.dir] * (tank.size / 2 + 2);
  const b = new Bullet(bx, by, tank.dir, tank.isPlayer);
  bullets.push(b);
}

// --- Damage / Explosions ---
function spawnExplosion(x, y, big) {
  const num = big ? 50 : 20;
  const colors = big
    ? ['#ff6b6b','#ffa502','#ffd700','#ff4757','#fff','#ff6348','#ff9ff3']
    : ['#ffa502','#ffd700','#ff6348','#fff'];
  for (let i = 0; i < num; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * (big ? 6 : 3);
    const life = 15 + Math.random() * (big ? 25 : 12);
    game.particles.push(new Particle(
      x + (Math.random() - 0.5) * 10,
      y + (Math.random() - 0.5) * 10,
      colors[Math.floor(Math.random() * colors.length)],
      Math.cos(angle) * speed,
      Math.sin(angle) * speed,
      life,
      big ? 2 + Math.random() * 5 : 1 + Math.random() * 3
    ));
  }
  game.explosions.push(new Explosion(x, y, big));
}

function dealDamage(tank, dmg) {
  tank.hp -= dmg;
  if (tank.hp <= 0) {
    tank.alive = false;
    spawnExplosion(tank.cx, tank.cy, true);
    if (tank.isPlayer) {
      lives--;
      updateUI();
      if (lives <= 0) {
        gameOver();
      } else {
        setTimeout(() => {
          if (game.state === 'playing') {
            player.x = 2 * TILE;
            player.y = 12 * TILE;
            player.hp = player.maxHp;
            player.alive = true;
            player.dir = DIR.UP;
            spawnEffect(player.cx, player.cy);
            updateUI();
          }
        }, 1200);
      }
    } else {
      game.score += 100;
      game.enemiesRemaining--;
      if (Math.random() < 0.18) {
        game.powerups.push({
          x: tank.x + TANK_SIZE/2 - 8,
          y: tank.y + TANK_SIZE/2 - 8,
          type: 'health',
          alive: true
        });
      }
      updateUI();
    }
  } else {
    for (let i = 0; i < 8; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 2;
      game.particles.push(new Particle(
        tank.cx, tank.cy, '#ffa502',
        Math.cos(angle) * speed,
        Math.sin(angle) * speed,
        10, 2
      ));
    }
  }
}

function gameOver() {
  game.state = 'gameover';
  player.alive = false;
}

// --- AI ---
function updateAI(enemy) {
  if (!enemy.alive) return;

  const dx = player.cx - enemy.cx;
  const dy = player.cy - enemy.cy;
  const dist = Math.hypot(dx, dy);

  enemy.aiChangeTimer++;
  enemy.cooldown = Math.max(0, enemy.cooldown - 1);

  // Decide which direction to go
  let desiredDir = enemy.dir;

  if (enemy.stuckCount > 8) {
    // Been stuck too long, pick a random new direction
    desiredDir = Math.floor(Math.random() * 4);
    enemy.stuckCount = 0;
  } else if (dist > 120) {
    // Move toward player along the dominant axis
    if (Math.abs(dx) > Math.abs(dy)) {
      desiredDir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
    } else {
      desiredDir = dy > 0 ? DIR.DOWN : DIR.UP;
    }
  }

  // Every so often, randomize direction slightly to avoid patterns
  if (enemy.aiChangeTimer > 60 + Math.floor(Math.random() * 60)) {
    if (Math.random() < 0.3) {
      desiredDir = Math.floor(Math.random() * 4);
    }
    enemy.aiChangeTimer = 0;
  }

  // Try directions in priority order
  const tryDir = [desiredDir, (desiredDir + 1) % 4, (desiredDir + 3) % 4, enemy.dir, (desiredDir + 2) % 4];
  let moved = false;

  for (const d of tryDir) {
    const nx = enemy.x + DIR.dx[d] * enemy.speed;
    const ny = enemy.y + DIR.dy[d] * enemy.speed;
    if (canMove(enemy, nx, ny)) {
      enemy.x = nx;
      enemy.y = ny;
      enemy.dir = d;
      moved = true;
      break;
    }
  }

  if (moved) {
    enemy.stuckCount = Math.max(0, enemy.stuckCount - 1);
  } else {
    enemy.stuckCount++;
  }

  // Shoot: only when aligned, within range, and not firing too often
  if (enemy.cooldown === 0 && dist < 400) {
    const aligned = (
      (enemy.dir === DIR.UP && dy < 0 && Math.abs(dx) < TANK_SIZE + 12) ||
      (enemy.dir === DIR.DOWN && dy > 0 && Math.abs(dx) < TANK_SIZE + 12) ||
      (enemy.dir === DIR.LEFT && dx < 0 && Math.abs(dy) < TANK_SIZE + 12) ||
      (enemy.dir === DIR.RIGHT && dx > 0 && Math.abs(dy) < TANK_SIZE + 12)
    );
    if (aligned && Math.random() < 0.35) {
      fireBullet(enemy);
    }
  }
}

// --- Player control ---
function updatePlayer() {
  if (!player || !player.alive) return;
  player.cooldown = Math.max(0, player.cooldown - 1);

  let dx = 0, dy = 0;
  if (game.keys['w'] || game.keys['arrowup']) dy = -1;
  if (game.keys['s'] || game.keys['arrowdown']) dy = 1;
  if (game.keys['a'] || game.keys['arrowleft']) dx = -1;
  if (game.keys['d'] || game.keys['arrowright']) dx = 1;

  if (dx !== 0 || dy !== 0) {
    if (dx !== 0 && dy !== 0) {
      const nx1 = player.x + dx * player.speed;
      const ny1 = player.y;
      const nx2 = player.x;
      const ny2 = player.y + dy * player.speed;

      const canX = canMove(player, nx1, ny1);
      const canY = canMove(player, nx2, ny2);

      if (canX) {
        player.x = nx1;
        player.dir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
      }
      if (canY) {
        player.y = ny2;
        player.dir = dy > 0 ? DIR.DOWN : DIR.UP;
      }
    } else {
      let newDir;
      if (dx === 0 && dy === -1) newDir = DIR.UP;
      else if (dx === 1 && dy === 0) newDir = DIR.RIGHT;
      else if (dx === 0 && dy === 1) newDir = DIR.DOWN;
      else if (dx === -1 && dy === 0) newDir = DIR.LEFT;

      const nx = player.x + DIR.dx[newDir] * player.speed;
      const ny = player.y + DIR.dy[newDir] * player.speed;
      if (canMove(player, nx, ny)) {
        player.x = nx;
        player.y = ny;
        player.dir = newDir;
      } else {
        if (DIR.dx[newDir] !== 0) {
          const ny_slide1 = player.y + 2;
          const ny_slide2 = player.y - 2;
          if (canMove(player, nx, ny_slide1)) { player.x = nx; player.y = ny_slide1; }
          else if (canMove(player, nx, ny_slide2)) { player.x = nx; player.y = ny_slide2; }
        } else {
          const nx_slide1 = player.x + 2;
          const nx_slide2 = player.x - 2;
          if (canMove(player, nx_slide1, ny)) { player.x = nx_slide1; player.y = ny; }
          else if (canMove(player, nx_slide2, ny)) { player.x = nx_slide2; player.y = ny; }
        }
      }
    }
  }

  if (game.keys[' '] || game.keys['j']) {
    if (player.canFire) {
      fireBullet(player);
      player.canFire = false;
    }
  } else {
    player.canFire = true;
  }
}

// --- Update bullets ---
function updateBullets() {
  for (const b of bullets) {
    if (!b.alive) continue;

    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > 5) b.trail.shift();

    b.x += DIR.dx[b.dir] * b.speed;
    b.y += DIR.dy[b.dir] * b.speed;

    if (b.x < 0 || b.x > W || b.y < 0 || b.y > H) {
      b.alive = false;
      continue;
    }

    let hitWall = false;
    for (const w of walls) {
      if (w.hp <= 0) continue;
      if (rectOverlap({ x: b.x - b.r, y: b.y - b.r, w: b.r * 2, h: b.r * 2 },
                      { x: w.x, y: w.y, w: w.w, h: w.h })) {
        w.hp -= 12;
        hitWall = true;
        for (let i = 0; i < 5; i++) {
          game.particles.push(new Particle(b.x, b.y, '#dfe6e9',
            (Math.random() - 0.5) * 3, (Math.random() - 0.5) * 3, 10, 2));
        }
        if (w.hp <= 0 && w.type === 'brick') {
          spawnExplosion(w.x + w.w/2, w.y + w.h/2, false);
        }
        break;
      }
    }
    if (hitWall) { b.alive = false; continue; }

    const targets = b.isPlayer ? enemies : [player];
    for (const t of targets) {
      if (!t || !t.alive) continue;
      if (rectOverlap({ x: b.x - b.r, y: b.y - b.r, w: b.r * 2, h: b.r * 2 },
                      { x: t.x, y: t.y, w: t.size, h: t.size })) {
        dealDamage(t, 20);
        b.alive = false;
        break;
      }
    }
  }

  bullets = bullets.filter(b => b.alive);
}

// --- Update particles ---
function updateParticles() {
  for (const p of game.particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.96;
    p.vy *= 0.96;
    p.life--;
    if (p.life <= 0) p.alive = false;
  }
  game.particles = game.particles.filter(p => p.alive);
}

// --- Update explosions ---
function updateExplosions() {
  for (const e of game.explosions) {
    e.radius += (e.maxRadius - e.radius) * 0.15;
    e.life--;
    if (e.life <= 0) e.alive = false;
  }
  game.explosions = game.explosions.filter(e => e.alive);
}

// --- Powerups ---
function updatePowerups() {
  for (const p of game.powerups) {
    if (!p.alive) continue;
    if (!player || !player.alive) continue;
    if (rectOverlap({ x: player.x, y: player.y, w: player.size, h: player.size },
                    { x: p.x, y: p.y, w: 16, h: 16 })) {
      p.alive = false;
      player.hp = Math.min(player.maxHp, player.hp + 35);
      for (let i = 0; i < 15; i++) {
        game.particles.push(new Particle(p.x + 8, p.y + 8, '#2ed573',
          (Math.random() - 0.5) * 4, (Math.random() - 0.5) * 4, 20, 3));
      }
      updateUI();
    }
  }
  game.powerups = game.powerups.filter(p => p.alive);
}

// --- Spawn logic ---
function updateWaves() {
  if (game.enemiesRemaining <= 0 && enemies.length === 0) {
    game.wave++;
    game.enemiesPerWave = 3 + game.wave * 1;
    game.enemiesRemaining = game.enemiesPerWave;
    game.spawnTimer = 0;
    game.spawnInterval = Math.max(120, 240 - game.wave * 10);
    updateUI();
  }

  if (game.enemiesRemaining > 0) {
    game.spawnTimer++;
    if (game.spawnTimer >= game.spawnInterval) {
      game.spawnTimer = 0;
      spawnEnemy();
    }
  }
}

// --- UI Update ---
function updateUI() {
  scoreSpan.textContent = game.score;
  waveSpan.textContent = game.wave;
  if (player) {
    const pct = Math.max(0, (player.hp / player.maxHp) * 100);
    healthFill.style.width = pct + '%';
  }
  livesSpan.textContent = Math.max(0, lives);
  enemyCountSpan.textContent = game.enemiesRemaining;
}

// =================== DRAWING ===================

function drawTank(tank) {
  if (!tank || !tank.alive) return;
  const { x, y, dir, size, isPlayer } = tank;
  const cx = x + size/2, cy = y + size/2;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(dir * Math.PI / 2);

  // Shadow
  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  ctx.shadowBlur = 8;
  ctx.shadowOffsetY = 2;

  // Track background
  ctx.fillStyle = isPlayer ? '#1e272e' : '#2d1f1a';
  ctx.fillRect(-size/2, -size/2, size, size);

  // Treads
  ctx.shadowBlur = 0;
  ctx.fillStyle = isPlayer ? '#485460' : '#5a3d2b';
  for (let i = -size/2 + 3; i < size/2 - 3; i += 5) {
    ctx.fillRect(-size/2, i, 4, 3);
    ctx.fillRect(size/2 - 4, i, 4, 3);
  }

  // Body - metallic gradient
  const bodyGrad = ctx.createLinearGradient(-size/2, -size/2, size/2, size/2);
  if (isPlayer) {
    bodyGrad.addColorStop(0, '#3d8b37');
    bodyGrad.addColorStop(0.4, '#4ea843');
    bodyGrad.addColorStop(0.7, '#2d7a28');
    bodyGrad.addColorStop(1, '#1a5c18');
  } else {
    bodyGrad.addColorStop(0, '#c0392b');
    bodyGrad.addColorStop(0.4, '#e74c3c');
    bodyGrad.addColorStop(0.7, '#a93226');
    bodyGrad.addColorStop(1, '#7b241c');
  }
  ctx.fillStyle = bodyGrad;
  ctx.shadowBlur = 4;
  ctx.beginPath();
  ctx.roundRect(-size/2 + 4, -size/2 + 4, size - 8, size - 8, 4);
  ctx.fill();

  // Body highlight
  ctx.shadowBlur = 0;
  ctx.fillStyle = isPlayer ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.06)';
  ctx.fillRect(-size/2 + 5, -size/2 + 5, size - 14, 4);

  // Turret circle
  ctx.shadowBlur = 6;
  ctx.shadowColor = isPlayer ? 'rgba(46,213,115,0.2)' : 'rgba(255,100,100,0.2)';
  ctx.fillStyle = isPlayer ? '#1e5631' : '#641e16';
  ctx.beginPath();
  ctx.arc(0, 0, size/4 + 1, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = isPlayer ? '#3d8b37' : '#922b21';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Turret highlight
  ctx.shadowBlur = 0;
  ctx.fillStyle = isPlayer ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.08)';
  ctx.beginPath();
  ctx.arc(-2, -2, size/6, 0, Math.PI * 2);
  ctx.fill();

  // Barrel
  ctx.shadowBlur = 4;
  ctx.shadowColor = 'rgba(0,0,0,0.3)';
  const barrelGrad = ctx.createLinearGradient(-4, -size/2, 4, -size/2 + 14);
  barrelGrad.addColorStop(0, isPlayer ? '#1e272e' : '#2d1f1a');
  barrelGrad.addColorStop(0.5, isPlayer ? '#485460' : '#5a3d2b');
  barrelGrad.addColorStop(1, isPlayer ? '#1e272e' : '#2d1f1a');
  ctx.fillStyle = barrelGrad;
  ctx.fillRect(-4, -size/2 + 2, 8, size/2 - 4);
  ctx.fillStyle = isPlayer ? '#2d6a4f' : '#922b21';
  ctx.fillRect(-5, -size/2 + 2, 10, 4);

  ctx.shadowBlur = 0;

  // HP bar (enemies)
  if (!isPlayer) {
    ctx.rotate(-dir * Math.PI / 2);
    const hpPct = tank.hp / tank.maxHp;
    const barW = size;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(-barW/2, -size/2 - 10, barW, 4);
    const hpColor = hpPct > 0.5 ? '#2ed573' : hpPct > 0.25 ? '#ffa502' : '#ff4757';
    ctx.fillStyle = hpColor;
    ctx.shadowColor = hpColor;
    ctx.shadowBlur = 6;
    ctx.fillRect(-barW/2, -size/2 - 10, barW * hpPct, 4);
    ctx.shadowBlur = 0;
  }

  ctx.restore();
}

function drawBullet(b) {
  ctx.save();

  // Trail
  for (let i = 0; i < b.trail.length; i++) {
    const t = i / b.trail.length;
    const alpha = t * 0.4;
    const r = b.r * t;
    ctx.fillStyle = b.isPlayer ? `rgba(255,215,0,${alpha})` : `rgba(255,80,80,${alpha})`;
    ctx.beginPath();
    ctx.arc(b.trail[i].x, b.trail[i].y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Glow
  const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r * 3);
  if (b.isPlayer) {
    grad.addColorStop(0, 'rgba(255,215,0,0.4)');
    grad.addColorStop(1, 'rgba(255,215,0,0)');
  } else {
    grad.addColorStop(0, 'rgba(255,80,80,0.4)');
    grad.addColorStop(1, 'rgba(255,80,80,0)');
  }
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r * 3, 0, Math.PI * 2);
  ctx.fill();

  // Core
  ctx.shadowColor = b.isPlayer ? '#ffd700' : '#ff4757';
  ctx.shadowBlur = 12;
  const core = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
  core.addColorStop(0, '#fff');
  core.addColorStop(0.3, b.isPlayer ? '#ffd700' : '#ff6b6b');
  core.addColorStop(1, b.isPlayer ? '#ff8c00' : '#c0392b');
  ctx.fillStyle = core;
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  ctx.restore();
}

function drawWalls() {
  for (const w of walls) {
    if (w.hp <= 0) continue;
    if (w.type === 'border') {
      ctx.fillStyle = '#1e272e';
      ctx.fillRect(w.x, w.y, w.w, w.h);
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 1;
      ctx.strokeRect(w.x, w.y, w.w, w.h);
    } else {
      const dmg = 1 - w.hp / 40;
      const r = Math.floor(195 - dmg * 100);
      const g = Math.floor(90 - dmg * 50);
      const bl = Math.floor(55 - dmg * 35);
      ctx.fillStyle = `rgb(${r},${g},${bl})`;
      ctx.fillRect(w.x, w.y, w.w, w.h);

      // Brick lines
      ctx.strokeStyle = `rgba(0,0,0,${0.15 + dmg * 0.35})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(w.x, w.y + w.h/2);
      ctx.lineTo(w.x + w.w, w.y + w.h/2);
      ctx.moveTo(w.x + w.w/4, w.y);
      ctx.lineTo(w.x + w.w/4, w.y + w.h/2);
      ctx.moveTo(w.x + w.w*3/4, w.y);
      ctx.lineTo(w.x + w.w*3/4, w.y + w.h/2);
      ctx.moveTo(w.x + w.w/2, w.y + w.h/2);
      ctx.lineTo(w.x + w.w/2, w.y + w.h);
      ctx.stroke();

      if (dmg > 0.3) {
        ctx.strokeStyle = `rgba(0,0,0,${dmg * 0.3})`;
        for (let i = 0; i < 2; i++) {
          ctx.beginPath();
          ctx.moveTo(w.x + Math.random() * w.w, w.y + Math.random() * w.h);
          ctx.lineTo(w.x + Math.random() * w.w, w.y + Math.random() * w.h);
          ctx.stroke();
        }
      }

      // Edge highlight
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.strokeRect(w.x, w.y, w.w, w.h);
    }
  }
}

function drawParticles() {
  for (const p of game.particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawExplosions() {
  for (const e of game.explosions) {
    const alpha = e.life / e.maxLife;
    const r = e.radius;

    // Outer glow
    ctx.shadowColor = `rgba(255,150,0,${alpha * 0.5})`;
    ctx.shadowBlur = 30;
    const grad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, r);
    grad.addColorStop(0, `rgba(255,255,255,${alpha * 0.9})`);
    grad.addColorStop(0.15, `rgba(255,220,50,${alpha * 0.7})`);
    grad.addColorStop(0.4, `rgba(255,120,0,${alpha * 0.4})`);
    grad.addColorStop(0.7, `rgba(200,50,0,${alpha * 0.15})`);
    grad.addColorStop(1, `rgba(100,0,0,0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(e.x, e.y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Shockwave ring
    ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.25})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(e.x, e.y, r * 1.4 * (1 - alpha * 0.3), 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawPowerups() {
  for (const p of game.powerups) {
    if (!p.alive) continue;
    const pulse = Math.sin(game.frame * 0.06) * 4;
    ctx.save();
    ctx.translate(p.x + 8, p.y + 8 + pulse);

    // Outer glow ring
    ctx.shadowColor = '#2ed573';
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.arc(0, 0, 10, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(46,213,115,0.15)';
    ctx.fill();

    // Cross
    ctx.shadowBlur = 15;
    ctx.fillStyle = '#2ed573';
    ctx.fillRect(-4, -7, 8, 14);
    ctx.fillRect(-7, -4, 14, 8);

    // Center dot
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.arc(0, 0, 2, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }
}

// --- Main game loop ---
function update() {
  if (game.state === 'gameover') return;
  game.frame++;

  updatePlayer();

  for (const enemy of enemies) {
    enemy.cooldown = Math.max(0, enemy.cooldown - 1);
    updateAI(enemy);
  }
  enemies = enemies.filter(e => e.alive);
  updateBullets();
  updateParticles();
  updateExplosions();
  updatePowerups();
  updateWaves();
  updateUI();

  // Auto-heal
  if (player && player.alive && player.hp < player.maxHp) {
    if (game.frame % 30 === 0) {
      player.hp = Math.min(player.maxHp, player.hp + 0.3);
      updateUI();
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Ground
  const gridGrad = ctx.createLinearGradient(0, 0, 0, H);
  gridGrad.addColorStop(0, '#1e272e');
  gridGrad.addColorStop(0.3, '#2d3436');
  gridGrad.addColorStop(0.7, '#2d3436');
  gridGrad.addColorStop(1, '#1e272e');
  ctx.fillStyle = gridGrad;
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= W; x += TILE) {
    ctx.beginPath();
    ctx.moveTo(x, 0); ctx.lineTo(x, H);
    ctx.stroke();
  }
  for (let y = 0; y <= H; y += TILE) {
    ctx.beginPath();
    ctx.moveTo(0, y); ctx.lineTo(W, y);
    ctx.stroke();
  }

  drawWalls();
  drawPowerups();
  drawExplosions();
  drawParticles();

  for (const b of bullets) drawBullet(b);

  for (const e of enemies) drawTank(e);
  if (player) drawTank(player);

  if (game.state === 'gameover') drawGameOver();
}

// --- Game loop ---
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// --- Input ---
document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  game.keys[key] = true;
  if (e.key === ' ') e.preventDefault();

  if (key === 'enter') {
    if (game.state === 'gameover' || !player) {
      resetGame();
    }
  }
});

document.addEventListener('keyup', (e) => {
  game.keys[e.key.toLowerCase()] = false;
});

// --- Polyfill roundRect ---
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r];
    const [tl, tr = tl, br = tl, bl = tr] = r;
    this.moveTo(x + tl, y);
    this.lineTo(x + w - tr, y);
    this.quadraticCurveTo(x + w, y, x + w, y + tr);
    this.lineTo(x + w, y + h - br);
    this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
    this.lineTo(x + bl, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - bl);
    this.lineTo(x, y + tl);
    this.quadraticCurveTo(x, y, x + tl, y);
    this.closePath();
    return this;
  };
}

// --- Initialize ---
game.state = 'paused';
player = null;
drawStartScreen();

let started = false;
document.addEventListener('keydown', function startHandler(e) {
  if (e.key === 'Enter' && !started) {
    started = true;
    resetGame();
    gameLoop();
  }
});
</script>
</body>
