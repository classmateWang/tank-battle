<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 - Tank Battle</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Segoe UI', Arial, sans-serif;
  overflow: hidden;
}
.game-wrapper {
  background: #16213e;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 0 60px rgba(0,100,255,0.15);
}
.game-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 8px 12px 8px;
  color: #e0e0e0;
  font-size: 16px;
}
.game-header .score { color: #ffd700; font-weight: bold; font-size: 20px; }
.game-header .lives { color: #ff4757; }
.game-header .wave { color: #00d2d3; }
.game-header .health-bar {
  width: 120px; height: 10px;
  background: #333; border-radius: 5px; overflow: hidden;
}
.game-header .health-fill {
  height: 100%; background: linear-gradient(90deg, #ff4757, #2ed573);
  transition: width 0.3s;
  border-radius: 5px;
}
canvas {
  display: block;
  border-radius: 8px;
  box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
  background: #2d3436;
  cursor: crosshair;
}
.game-footer {
  display: flex;
  justify-content: space-between;
  padding-top: 10px;
  color: #888;
  font-size: 13px;
}
.game-footer kbd {
  background: #2d3436;
  padding: 2px 8px;
  border-radius: 4px;
  color: #ddd;
  font-size: 12px;
}
.btn {
  background: #0984e3;
  border: none;
  color: white;
  padding: 6px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: background 0.2s;
}
.btn:hover { background: #0873c7; }
.hidden { display: none; }
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="game-header">
    <span>🏆 <span class="score" id="scoreDisplay">0</span></span>
    <span>🌊 <span class="wave" id="waveDisplay">第 1 波</span></span>
    <div class="health-bar"><div class="health-fill" id="healthFill" style="width:100%"></div></div>
    <span>❤️ <span class="lives" id="livesDisplay">3</span></span>
  </div>

  <canvas id="gameCanvas" width="800" height="600"></canvas>

  <div class="game-footer">
    <span><kbd>W A S D</kbd> 移动 · <kbd>Space</kbd> 射击</span>
    <span>剩余敌人: <span id="enemyCount">0</span></span>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreSpan = document.getElementById('scoreDisplay');
const waveSpan = document.getElementById('waveDisplay');
const healthFill = document.getElementById('healthFill');
const livesSpan = document.getElementById('livesDisplay');
const enemyCountSpan = document.getElementById('enemyCount');

const W = 800, H = 600;
const TANK_SIZE = 32;
const BULLET_RADIUS = 4;
const TILE = 40;

// Directions helper
const DIR = {
  UP: 0, RIGHT: 1, DOWN: 2, LEFT: 3,
  dx: [0, 1, 0, -1],
  dy: [-1, 0, 1, 0]
};

// --- Game State ---
const game = {
  state: 'playing', // playing | gameover | paused
  score: 0,
  wave: 1,
  enemiesRemaining: 0,
  enemiesPerWave: 4,
  spawnTimer: 0,
  spawnInterval: 180,
  frame: 0,
  particles: [],
  explosions: [],
  powerups: [],
  keys: {},
};

// --- Tank class ---
class Tank {
  constructor(x, y, dir, isPlayer) {
    this.x = x;
    this.y = y;
    this.dir = dir; // 0=UP, 1=RIGHT, 2=DOWN, 3=LEFT
    this.size = TANK_SIZE;
    this.speed = isPlayer ? 2.2 : 1.2;
    this.hp = isPlayer ? 100 : 40;
    this.maxHp = this.hp;
    this.isPlayer = isPlayer;
    this.cooldown = 0;
    this.maxCooldown = isPlayer ? 18 : 45; // frames
    this.alive = true;
    this.moveDir = dir;
    this.targetDir = dir;
    this.turnCooldown = 0;
    this.lastShot = 0;
  }

  get cx() { return this.x + this.size / 2; }
  get cy() { return this.y + this.size / 2; }

  getBounds() {
    return { x: this.x, y: this.y, w: this.size, h: this.size };
  }
}

// --- Bullet ---
class Bullet {
  constructor(x, y, dir, isPlayer) {
    this.x = x;
    this.y = y;
    this.dir = dir;
    this.speed = isPlayer ? 6 : 4;
    this.r = BULLET_RADIUS;
    this.isPlayer = isPlayer;
    this.alive = true;
    this.trail = [];
  }
}

// --- Particle ---
class Particle {
  constructor(x, y, color, vx, vy, life, size) {
    this.x = x; this.y = y;
    this.vx = vx; this.vy = vy;
    this.color = color;
    this.life = life;
    this.maxLife = life;
    this.size = size || 3;
    this.alive = true;
  }
}

// --- Explosion ---
class Explosion {
  constructor(x, y, big) {
    this.x = x; this.y = y;
    this.radius = big ? 8 : 4;
    this.maxRadius = big ? 50 : 30;
    this.life = big ? 30 : 20;
    this.maxLife = this.life;
    this.alive = true;
    this.big = big;
  }
}

// --- Map / Walls ---
let walls = [];

function initMap() {
  walls = [];
  // Border walls
  const borderStyle = { type: 'border', hp: Infinity };
  for (let x = 0; x < W; x += TILE) {
    walls.push({ x, y: 0, w: TILE, h: TILE, ...borderStyle });
    walls.push({ x, y: H - TILE, w: TILE, h: TILE, ...borderStyle });
  }
  for (let y = TILE; y < H - TILE; y += TILE) {
    walls.push({ x: 0, y, w: TILE, h: TILE, ...borderStyle });
    walls.push({ x: W - TILE, y, w: TILE, h: TILE, ...borderStyle });
  }

  // Brick walls - interior layout
  const layouts = [
    // Layout 1
    () => {
      const bricks = [
        [5,2],[5,3],[5,4],[5,5],[5,6],[5,7],[5,8],[5,9],[5,10],[5,11],[5,12],
        [14,2],[14,3],[14,4],[14,5],[14,6],[14,7],[14,8],[14,9],[14,10],[14,11],[14,12],
        [3,5],[4,5],[6,5],[7,5],[8,5],[9,5],[10,5],[11,5],[12,5],[13,5],[15,5],[16,5],[17,5],
        [3,10],[4,10],[6,10],[7,10],[8,10],[9,10],[10,10],[11,10],[12,10],[13,10],[15,10],[16,10],[17,10],
        [9,2],[9,3],[9,4],[9,11],[9,12],[9,13],
        [2,8],[3,8],[4,8],[5,8],
        [15,7],[16,7],[17,7],[18,7],
      ];
      for (const [col, row] of bricks) {
        walls.push({ x: col * TILE, y: row * TILE, w: TILE, h: TILE, type: 'brick', hp: 30 });
      }
    },
    // Layout 2 - open center
    () => {
      const bricks = [
        [2,2],[2,3],[2,4],[2,5],[2,6],[2,7],[2,8],[2,9],[2,10],[2,11],[2,12],[2,13],
        [18,2],[18,3],[18,4],[18,5],[18,6],[18,7],[18,8],[18,9],[18,10],[18,11],[18,12],[18,13],
        [4,3],[5,3],[6,3],[7,3],[8,3],[9,3],[10,3],[11,3],[12,3],[13,3],[14,3],[15,3],[16,3],
        [4,12],[5,12],[6,12],[7,12],[8,12],[9,12],[10,12],[11,12],[12,12],[13,12],[14,12],[15,12],[16,12],
        [7,5],[8,5],[9,5],[10,5],[11,5],[12,5],[13,5],
        [7,10],[8,10],[9,10],[10,10],[11,10],[12,10],[13,10],
        [4,7],[5,7],[6,7],[7,7],[13,7],[14,7],[15,7],[16,7],
        [4,8],[5,8],[6,8],[7,8],[13,8],[14,8],[15,8],[16,8],
        [10,2],[10,13],
      ];
      for (const [col, row] of bricks) {
        walls.push({ x: col * TILE, y: row * TILE, w: TILE, h: TILE, type: 'brick', hp: 30 });
      }
    },
    // Layout 3 - cross pattern
    () => {
      const bricks = [
        [5,3],[6,3],[7,3],[8,3],[9,3],[10,3],[11,3],[12,3],[13,3],[14,3],[15,3],
        [5,12],[6,12],[7,12],[8,12],[9,12],[10,12],[11,12],[12,12],[13,12],[14,12],[15,12],
        [10,5],[10,6],[10,7],[10,8],[10,9],[10,10],
        [3,5],[4,5],[5,5],[6,5],[7,5],
        [3,10],[4,10],[5,10],[6,10],[7,10],
        [13,5],[14,5],[15,5],[16,5],[17,5],
        [13,10],[14,10],[15,10],[16,10],[17,10],
        [5,7],[6,7],[7,7],[8,7],
        [5,8],[6,8],[7,8],[8,7],
        [12,7],[13,7],[14,7],[15,7],
        [12,8],[13,8],[14,8],[15,8],
        [3,2],[4,2],[5,2],[6,2],[7,2],
        [13,2],[14,2],[15,2],[16,2],[17,2],
        [3,13],[4,13],[5,13],[6,13],[7,13],
        [13,13],[14,13],[15,13],[16,13],[17,13],
      ];
      for (const [col, row] of bricks) {
        walls.push({ x: col * TILE, y: row * TILE, w: TILE, h: TILE, type: 'brick', hp: 30 });
      }
    },
  ];

  layouts[Math.floor(Math.random() * layouts.length)]();
}

// --- Game objects ---
let player = null;
let enemies = [];
let bullets = [];

function resetGame() {
  player = new Tank(2 * TILE, 12 * TILE, DIR.UP, true);
  player.hp = 100;
  player.maxHp = 100;
  enemies = [];
  bullets = [];
  game.particles = [];
  game.explosions = [];
  game.powerups = [];
  game.score = 0;
  game.wave = 1;
  game.enemiesPerWave = 4;
  game.enemiesRemaining = game.enemiesPerWave;
  game.spawnTimer = 0;
  game.spawnInterval = 120;
  game.state = 'playing';
  player.alive = true;
  lives = 3;
  initMap();
  updateUI();
}

let lives = 3;

// --- Collision ---
function rectOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

function canMove(tank, nx, ny, ignoreEnemy) {
  const tb = { x: nx, y: ny, w: tank.size, h: tank.size };
  // Wall collision
  for (const w of walls) {
    if (rectOverlap(tb, { x: w.x, y: w.y, w: w.w, h: w.h })) return false;
  }
  // Tank collision
  const allTanks = [player, ...enemies].filter(t => t && t.alive && t !== tank);
  for (const t of allTanks) {
    if (rectOverlap(tb, { x: t.x, y: t.y, w: t.size, h: t.size })) return false;
  }
  return true;
}

function canPlace(x, y) {
  const tb = { x, y, w: TANK_SIZE, h: TANK_SIZE };
  for (const w of walls) {
    if (rectOverlap(tb, { x: w.x, y: w.y, w: w.w, h: w.h })) return false;
  }
  return true;
}

// --- Spawning ---
function getSpawnPos() {
  const candidates = [
    { x: 2 * TILE, y: 2 * TILE },
    { x: 10 * TILE, y: 2 * TILE },
    { x: 17 * TILE, y: 2 * TILE },
    { x: 2 * TILE, y: 7 * TILE },
    { x: 17 * TILE, y: 7 * TILE },
    { x: 10 * TILE, y: 13 * TILE },
  ];
  // Filter out positions near player and occupied
  const shuffled = candidates.sort(() => Math.random() - 0.5);
  for (const pos of shuffled) {
    if (!canPlace(pos.x, pos.y)) continue;
    if (player && player.alive) {
      const dist = Math.hypot(pos.x - player.x, pos.y - player.y);
      if (dist < 200) continue;
    }
    return pos;
  }
  return { x: 18 * TILE, y: 2 * TILE };
}

function spawnEnemy() {
  if (game.state !== 'playing') return;
  if (enemies.length >= 8) return;
  const pos = getSpawnPos();
  if (!pos) return;
  const dirs = [DIR.DOWN, DIR.LEFT, DIR.RIGHT, DIR.UP];
  const tank = new Tank(pos.x, pos.y, dirs[Math.floor(Math.random() * 4)], false);
  tank.hp = 30 + game.wave * 5;
  tank.maxHp = tank.hp;
  tank.speed = 1 + Math.min(game.wave * 0.05, 0.5);
  tank.maxCooldown = Math.max(25, 45 - game.wave * 1.5);
  enemies.push(tank);
  spawnEffect(pos.x + TANK_SIZE/2, pos.y + TANK_SIZE/2);
}

function spawnEffect(x, y) {
  for (let i = 0; i < 20; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    game.particles.push(new Particle(
      x, y,
      '#74b9ff',
      Math.cos(angle) * speed,
      Math.sin(angle) * speed,
      20 + Math.random() * 15,
      2 + Math.random() * 3
    ));
  }
}

// --- Bullet logic ---
function fireBullet(tank) {
  if (tank.cooldown > 0) return;
  if (!tank.alive) return;
  tank.cooldown = tank.maxCooldown;
  const cx = tank.cx;
  const cy = tank.cy;
  const bx = cx + DIR.dx[tank.dir] * (tank.size / 2 + 2);
  const by = cy + DIR.dy[tank.dir] * (tank.size / 2 + 2);
  const b = new Bullet(bx, by, tank.dir, tank.isPlayer);
  bullets.push(b);
}

// --- Damage / Explosions ---
function spawnExplosion(x, y, big) {
  const num = big ? 40 : 15;
  const colors = big
    ? ['#ff6b6b','#ffa502','#ffd700','#ff4757','#fff','#ff6348']
    : ['#ffa502','#ffd700','#ff6348','#fff'];
  for (let i = 0; i < num; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * (big ? 5 : 3);
    const life = 15 + Math.random() * (big ? 20 : 10);
    game.particles.push(new Particle(
      x + (Math.random() - 0.5) * 10,
      y + (Math.random() - 0.5) * 10,
      colors[Math.floor(Math.random() * colors.length)],
      Math.cos(angle) * speed,
      Math.sin(angle) * speed,
      life,
      big ? 2 + Math.random() * 4 : 1 + Math.random() * 3
    ));
  }
  game.explosions.push(new Explosion(x, y, big));
}

function dealDamage(tank, dmg) {
  tank.hp -= dmg;
  if (tank.hp <= 0) {
    tank.alive = false;
    spawnExplosion(tank.cx, tank.cy, true);
    if (tank.isPlayer) {
      lives--;
      updateUI();
      if (lives <= 0) {
        gameOver();
      } else {
        // Respawn player
        setTimeout(() => {
          if (game.state === 'playing') {
            player.x = 2 * TILE;
            player.y = 12 * TILE;
            player.hp = player.maxHp;
            player.alive = true;
            player.dir = DIR.UP;
            spawnEffect(player.cx, player.cy);
            updateUI();
          }
        }, 1000);
      }
    } else {
      game.score += 100;
      game.enemiesRemaining--;
      // Drop powerup chance
      if (Math.random() < 0.15) {
        game.powerups.push({
          x: tank.x + TANK_SIZE/2 - 8,
          y: tank.y + TANK_SIZE/2 - 8,
          type: 'health',
          alive: true
        });
      }
      updateUI();
    }
  } else {
    // Small hit effect
    for (let i = 0; i < 8; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 2;
      game.particles.push(new Particle(
        tank.cx, tank.cy, '#ffa502',
        Math.cos(angle) * speed,
        Math.sin(angle) * speed,
        10, 2
      ));
    }
  }
}

function gameOver() {
  game.state = 'gameover';
  player.alive = false;
}

// --- AI ---
function updateAI(enemy) {
  if (!enemy.alive) return;

  const dx = player.cx - enemy.cx;
  const dy = player.cy - enemy.cy;
  const dist = Math.hypot(dx, dy);

  // Determine desired direction to face player
  let desiredDir = enemy.dir;
  if (dist > 100) {
    // Move toward player
    if (Math.abs(dx) > Math.abs(dy)) {
      desiredDir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
    } else {
      desiredDir = dy > 0 ? DIR.DOWN : DIR.UP;
    }
  }

  // Try to move in desired or current direction
  let moved = false;
  const tryDir = [desiredDir, enemy.dir, (desiredDir + 1) % 4, (desiredDir + 3) % 4, (desiredDir + 2) % 4];

  for (const d of tryDir) {
    const nx = enemy.x + DIR.dx[d] * enemy.speed;
    const ny = enemy.y + DIR.dy[d] * enemy.speed;
    if (canMove(enemy, nx, ny)) {
      enemy.x = nx;
      enemy.y = ny;
      enemy.dir = d;
      moved = true;
      break;
    }
  }

  if (!moved) {
    enemy.dir = (enemy.dir + 1) % 4;
  }

  // Shoot if roughly aligned with player
  enemy.cooldown = Math.max(0, enemy.cooldown - 1);
  if (enemy.cooldown === 0 && dist < 500) {
    const aligned = (
      (enemy.dir === DIR.UP && dy < 0 && Math.abs(dx) < TANK_SIZE) ||
      (enemy.dir === DIR.DOWN && dy > 0 && Math.abs(dx) < TANK_SIZE) ||
      (enemy.dir === DIR.LEFT && dx < 0 && Math.abs(dy) < TANK_SIZE) ||
      (enemy.dir === DIR.RIGHT && dx > 0 && Math.abs(dy) < TANK_SIZE)
    );
    if (aligned || Math.random() < 0.03) {
      fireBullet(enemy);
    }
  }
}

// --- Player control ---
function updatePlayer() {
  if (!player || !player.alive) return;
  player.cooldown = Math.max(0, player.cooldown - 1);

  let dx = 0, dy = 0;
  if (game.keys['w'] || game.keys['arrowup']) dy = -1;
  if (game.keys['s'] || game.keys['arrowdown']) dy = 1;
  if (game.keys['a'] || game.keys['arrowleft']) dx = -1;
  if (game.keys['d'] || game.keys['arrowright']) dx = 1;

  if (dx !== 0 || dy !== 0) {
    // Determine direction from input
    let newDir;
    if (dx === 0 && dy === -1) newDir = DIR.UP;
    else if (dx === 1 && dy === 0) newDir = DIR.RIGHT;
    else if (dx === 0 && dy === 1) newDir = DIR.DOWN;
    else if (dx === -1 && dy === 0) newDir = DIR.LEFT;

    // Allow diagonal: prioritize the direction with larger magnitude
    if (dx !== 0 && dy !== 0) {
      // Try both, pick whichever results in movement
      const nx1 = player.x + dx * player.speed;
      const ny1 = player.y;
      const nx2 = player.x;
      const ny2 = player.y + dy * player.speed;

      const canX = canMove(player, nx1, ny1);
      const canY = canMove(player, nx2, ny2);

      if (canX) {
        player.x = nx1;
        player.dir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
      }
      if (canY) {
        player.y = ny2;
        player.dir = dy > 0 ? DIR.DOWN : DIR.UP;
      }
    } else {
      const nx = player.x + DIR.dx[newDir] * player.speed;
      const ny = player.y + DIR.dy[newDir] * player.speed;
      if (canMove(player, nx, ny)) {
        player.x = nx;
        player.y = ny;
        player.dir = newDir;
      } else {
        // Try sliding along wall
        if (DIR.dx[newDir] !== 0) {
          const ny_slide1 = player.y + 2;
          const ny_slide2 = player.y - 2;
          if (canMove(player, nx, ny_slide1)) { player.x = nx; player.y = ny_slide1; }
          else if (canMove(player, nx, ny_slide2)) { player.x = nx; player.y = ny_slide2; }
        } else {
          const nx_slide1 = player.x + 2;
          const nx_slide2 = player.x - 2;
          if (canMove(player, nx_slide1, ny)) { player.x = nx_slide1; player.y = ny; }
          else if (canMove(player, nx_slide2, ny)) { player.x = nx_slide2; player.y = ny; }
        }
      }
    }
  }

  // Shoot
  if (game.keys[' '] || game.keys['j']) {
    fireBullet(player);
  }
}

// --- Update bullets ---
function updateBullets() {
  for (const b of bullets) {
    if (!b.alive) continue;

    // Store trail
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > 5) b.trail.shift();

    b.x += DIR.dx[b.dir] * b.speed;
    b.y += DIR.dy[b.dir] * b.speed;

    // Out of bounds
    if (b.x < 0 || b.x > W || b.y < 0 || b.y > H) {
      b.alive = false;
      continue;
    }

    // Hit walls
    let hitWall = false;
    for (const w of walls) {
      if (w.hp <= 0) continue;
      if (rectOverlap({ x: b.x - b.r, y: b.y - b.r, w: b.r * 2, h: b.r * 2 },
                      { x: w.x, y: w.y, w: w.w, h: w.h })) {
        w.hp -= 10;
        hitWall = true;
        for (let i = 0; i < 5; i++) {
          game.particles.push(new Particle(b.x, b.y, '#dfe6e9',
            (Math.random() - 0.5) * 3, (Math.random() - 0.5) * 3, 10, 2));
        }
        if (w.hp <= 0 && w.type === 'brick') {
          spawnExplosion(w.x + w.w/2, w.y + w.h/2, false);
        }
        break;
      }
    }
    if (hitWall) { b.alive = false; continue; }

    // Hit tanks
    const targets = b.isPlayer ? enemies : [player];
    for (const t of targets) {
      if (!t || !t.alive) continue;
      if (rectOverlap({ x: b.x - b.r, y: b.y - b.r, w: b.r * 2, h: b.r * 2 },
                      { x: t.x, y: t.y, w: t.size, h: t.size })) {
        dealDamage(t, 20);
        b.alive = false;
        break;
      }
    }
  }

  bullets = bullets.filter(b => b.alive);
}

// --- Update particles ---
function updateParticles() {
  for (const p of game.particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.96;
    p.vy *= 0.96;
    p.life--;
    if (p.life <= 0) p.alive = false;
  }
  game.particles = game.particles.filter(p => p.alive);
}

// --- Update explosions ---
function updateExplosions() {
  for (const e of game.explosions) {
    e.radius += (e.maxRadius - e.radius) * 0.15;
    e.life--;
    if (e.life <= 0) e.alive = false;
  }
  game.explosions = game.explosions.filter(e => e.alive);
}

// --- Powerups ---
function updatePowerups() {
  for (const p of game.powerups) {
    if (!p.alive) continue;
    if (!player || !player.alive) continue;
    if (rectOverlap({ x: player.x, y: player.y, w: player.size, h: player.size },
                    { x: p.x, y: p.y, w: 16, h: 16 })) {
      p.alive = false;
      player.hp = Math.min(player.maxHp, player.hp + 30);
      for (let i = 0; i < 15; i++) {
        game.particles.push(new Particle(p.x + 8, p.y + 8, '#2ed573',
          (Math.random() - 0.5) * 4, (Math.random() - 0.5) * 4, 20, 3));
      }
      updateUI();
    }
  }
  game.powerups = game.powerups.filter(p => p.alive);
}

// --- Spawn logic ---
function updateWaves() {
  if (game.enemiesRemaining <= 0 && enemies.length === 0) {
    // Next wave
    game.wave++;
    game.enemiesPerWave = 4 + game.wave * 2;
    game.enemiesRemaining = game.enemiesPerWave;
    game.spawnTimer = 0;
    game.spawnInterval = Math.max(40, 120 - game.wave * 5);
    updateUI();
  }

  // Spawn enemies
  if (game.enemiesRemaining > 0) {
    game.spawnTimer++;
    if (game.spawnTimer >= game.spawnInterval) {
      game.spawnTimer = 0;
      spawnEnemy();
    }
  }
}

// --- UI Update ---
function updateUI() {
  scoreSpan.textContent = game.score;
  waveSpan.textContent = `第 ${game.wave} 波`;
  if (player) {
    const pct = Math.max(0, (player.hp / player.maxHp) * 100);
    healthFill.style.width = pct + '%';
  }
  livesSpan.textContent = Math.max(0, lives);
  enemyCountSpan.textContent = game.enemiesRemaining;
}

// --- DRAWING ---

function drawTank(tank) {
  if (!tank || !tank.alive) return;
  const { x, y, dir, size, isPlayer } = tank;
  const cx = x + size/2, cy = y + size/2;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(dir * Math.PI / 2);

  // Track
  ctx.fillStyle = isPlayer ? '#2d3436' : '#4a3728';
  ctx.fillRect(-size/2, -size/2, size, size);

  // Track details (treads)
  ctx.fillStyle = isPlayer ? '#636e72' : '#6d5a3a';
  const treadW = 4;
  for (let i = -size/2 + 3; i < size/2 - 3; i += 5) {
    ctx.fillRect(-size/2, i, treadW, 3);
    ctx.fillRect(size/2 - treadW, i, treadW, 3);
  }

  // Body
  const bodyGrad = ctx.createRadialGradient(0, 2, 2, 0, 0, size/2 - 4);
  if (isPlayer) {
    bodyGrad.addColorStop(0, '#55a630');
    bodyGrad.addColorStop(0.6, '#2b9348');
    bodyGrad.addColorStop(1, '#1a5a2a');
  } else {
    bodyGrad.addColorStop(0, '#e74c3c');
    bodyGrad.addColorStop(0.6, '#c0392b');
    bodyGrad.addColorStop(1, '#7b241c');
  }
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.roundRect(-size/2 + 5, -size/2 + 5, size - 10, size - 10, 3);
  ctx.fill();

  // Turret circle
  ctx.fillStyle = isPlayer ? '#2d6a4f' : '#922b21';
  ctx.beginPath();
  ctx.arc(0, 0, size/4, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = isPlayer ? '#40916c' : '#b03a2e';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Barrel
  ctx.fillStyle = isPlayer ? '#1b4332' : '#641e16';
  ctx.fillRect(-3, -size/2 + 2, 6, size/2 - 4);
  ctx.fillStyle = isPlayer ? '#2d6a4f' : '#922b21';
  ctx.fillRect(-4, -size/2 + 2, 8, 4);

  // HP bar (enemies)
  if (!isPlayer) {
    ctx.rotate(-dir * Math.PI / 2);
    const hpPct = tank.hp / tank.maxHp;
    ctx.fillStyle = '#333';
    ctx.fillRect(-size/2, -size/2 - 8, size, 4);
    ctx.fillStyle = hpPct > 0.5 ? '#2ed573' : hpPct > 0.25 ? '#ffa502' : '#ff4757';
    ctx.fillRect(-size/2, -size/2 - 8, size * hpPct, 4);
  }

  ctx.restore();
}

function drawBullet(b) {
  ctx.save();
  // Trail
  for (let i = 0; i < b.trail.length; i++) {
    const alpha = i / b.trail.length * 0.5;
    ctx.fillStyle = b.isPlayer ? `rgba(255,215,0,${alpha})` : `rgba(255,100,100,${alpha})`;
    ctx.beginPath();
    ctx.arc(b.trail[i].x, b.trail[i].y, b.r * (i / b.trail.length), 0, Math.PI * 2);
    ctx.fill();
  }

  // Bullet
  const grad = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
  if (b.isPlayer) {
    grad.addColorStop(0, '#fff');
    grad.addColorStop(0.3, '#ffd700');
    grad.addColorStop(1, '#ff8c00');
  } else {
    grad.addColorStop(0, '#fff');
    grad.addColorStop(0.3, '#ff6b6b');
    grad.addColorStop(1, '#c0392b');
  }
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
  ctx.fill();

  // Glow
  ctx.shadowColor = b.isPlayer ? '#ffd700' : '#ff4757';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r * 0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  ctx.restore();
}

function drawWalls() {
  for (const w of walls) {
    if (w.hp <= 0) continue;
    if (w.type === 'border') {
      ctx.fillStyle = '#2d3436';
      ctx.fillRect(w.x, w.y, w.w, w.h);
      ctx.strokeStyle = '#636e72';
      ctx.lineWidth = 1;
      ctx.strokeRect(w.x, w.y, w.w, w.h);
    } else {
      // Brick
      const dmg = 1 - w.hp / 30;
      const r = 180 - dmg * 80;
      const g = 80 - dmg * 40;
      const b_val = 50 - dmg * 30;
      ctx.fillStyle = `rgb(${r},${g},${b_val})`;
      ctx.fillRect(w.x, w.y, w.w, w.h);

      // Brick pattern
      ctx.strokeStyle = `rgba(0,0,0,${0.2 + dmg * 0.3})`;
      ctx.lineWidth = 1;
      // Horizontal line
      ctx.beginPath();
      ctx.moveTo(w.x, w.y + w.h/2);
      ctx.lineTo(w.x + w.w, w.y + w.h/2);
      ctx.stroke();
      // Vertical lines
      ctx.beginPath();
      ctx.moveTo(w.x + w.w/4, w.y);
      ctx.lineTo(w.x + w.w/4, w.y + w.h/2);
      ctx.moveTo(w.x + w.w*3/4, w.y);
      ctx.lineTo(w.x + w.w*3/4, w.y + w.h/2);
      ctx.moveTo(w.x + w.w/2, w.y + w.h/2);
      ctx.lineTo(w.x + w.w/2, w.y + w.h);
      ctx.stroke();

      // Damage cracks
      if (dmg > 0.3) {
        ctx.strokeStyle = `rgba(0,0,0,${dmg * 0.4})`;
        ctx.lineWidth = 1;
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          ctx.moveTo(w.x + Math.random() * w.w, w.y + Math.random() * w.h);
          ctx.lineTo(w.x + Math.random() * w.w, w.y + Math.random() * w.h);
          ctx.stroke();
        }
      }
    }
  }
}

function drawParticles() {
  for (const p of game.particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawExplosions() {
  for (const e of game.explosions) {
    const alpha = e.life / e.maxLife;
    const r = e.radius;
    // Outer glow
    const grad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, r);
    grad.addColorStop(0, `rgba(255,255,255,${alpha * 0.8})`);
    grad.addColorStop(0.2, `rgba(255,200,50,${alpha * 0.6})`);
    grad.addColorStop(0.5, `rgba(255,100,0,${alpha * 0.3})`);
    grad.addColorStop(1, `rgba(255,50,0,0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(e.x, e.y, r, 0, Math.PI * 2);
    ctx.fill();

    // Shockwave
    ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.3})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(e.x, e.y, r * 1.3, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawPowerups() {
  for (const p of game.powerups) {
    if (!p.alive) continue;
    const pulse = Math.sin(game.frame * 0.05) * 3;
    ctx.save();
    ctx.translate(p.x + 8, p.y + 8 + pulse);

    // Glow
    ctx.shadowColor = '#2ed573';
    ctx.shadowBlur = 15;

    // Cross (health)
    ctx.fillStyle = '#2ed573';
    ctx.fillRect(-4, -6, 8, 12);
    ctx.fillRect(-6, -4, 12, 8);

    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#ff4757';
  ctx.font = 'bold 64px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('GAME OVER', W/2, H/2 - 40);

  ctx.fillStyle = '#ffd700';
  ctx.font = '28px Arial';
  ctx.fillText(`最终得分: ${game.score}`, W/2, H/2 + 40);

  ctx.fillStyle = '#aaa';
  ctx.font = '20px Arial';
  ctx.fillText('按 Enter 重新开始', W/2, H/2 + 100);
}

function drawStartScreen() {
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  // Title
  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 56px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('坦 克 大 战', W/2, H/2 - 80);

  ctx.fillStyle = '#74b9ff';
  ctx.font = '20px Arial';
  ctx.fillText('TANK BATTLE', W/2, H/2 - 30);

  // Tank icon
  ctx.save();
  ctx.translate(W/2, H/2 + 40);
  ctx.scale(2, 2);
  const demo = new Tank(-16, -16, DIR.UP, true);
  drawTank(demo);
  ctx.restore();

  ctx.fillStyle = '#aaa';
  ctx.font = '18px Arial';
  ctx.fillText('W A S D  移动 · 空格 射击', W/2, H/2 + 110);
  ctx.fillText('消灭所有敌人，生存到最后！', W/2, H/2 + 140);

  ctx.fillStyle = '#ffd700';
  ctx.font = '22px Arial';
  ctx.fillText('按 Enter 开始游戏', W/2, H/2 + 190);
}

// --- Main game loop ---
function update() {
  if (game.state === 'gameover') return;
  game.frame++;

  updatePlayer();

  for (const enemy of enemies) {
    enemy.cooldown = Math.max(0, enemy.cooldown - 1);
    updateAI(enemy);
  }
  enemies = enemies.filter(e => e.alive);
  updateBullets();
  updateParticles();
  updateExplosions();
  updatePowerups();
  updateWaves();
  updateUI();

  // Auto-heal player slightly over time
  if (player && player.alive && player.hp < player.maxHp) {
    if (game.frame % 30 === 0) {
      player.hp = Math.min(player.maxHp, player.hp + 0.5);
      updateUI();
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Ground
  const gridGrad = ctx.createLinearGradient(0, 0, 0, H);
  gridGrad.addColorStop(0, '#2d3436');
  gridGrad.addColorStop(0.5, '#34495e');
  gridGrad.addColorStop(1, '#2d3436');
  ctx.fillStyle = gridGrad;
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= W; x += TILE) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  for (let y = 0; y <= H; y += TILE) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }

  drawWalls();
  drawPowerups();
  drawExplosions();
  drawParticles();

  for (const b of bullets) drawBullet(b);

  for (const e of enemies) drawTank(e);
  if (player) drawTank(player);

  if (game.state === 'gameover') drawGameOver();
}

// --- Game loop ---
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// --- Input ---
document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  game.keys[key] = true;
  if (e.key === ' ') e.preventDefault();

  if (key === 'enter') {
    if (game.state === 'gameover' || !player) {
      resetGame();
    }
  }
});

document.addEventListener('keyup', (e) => {
  game.keys[e.key.toLowerCase()] = false;
});

// --- Polyfill roundRect ---
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = [r];
    const [tl, tr = tl, br = tl, bl = tr] = r;
    this.moveTo(x + tl, y);
    this.lineTo(x + w - tr, y);
    this.quadraticCurveTo(x + w, y, x + w, y + tr);
    this.lineTo(x + w, y + h - br);
    this.quadraticCurveTo(x + w, y + h, x + w - br, y + h);
    this.lineTo(x + bl, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - bl);
    this.lineTo(x, y + tl);
    this.quadraticCurveTo(x, y, x + tl, y);
    this.closePath();
    return this;
  };
}

// --- Initialize ---
game.state = 'paused'; // show start screen
player = null;

// Draw start screen immediately
drawStartScreen();

// Custom init for first start
let started = false;
document.addEventListener('keydown', function startHandler(e) {
  if (e.key === 'Enter' && !started) {
    started = true;
    resetGame();
    gameLoop();
  }
});
</script>
